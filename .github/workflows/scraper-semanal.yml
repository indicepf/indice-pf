name: Scraper Semanal — Índice PF

on:
  schedule:
    # Dias 1 e 15 às 8h (Brasília = 11h UTC) = 2 coletas/mês.
    # 99 ingredientes × 2 = 198 chamadas/mês, dentro do plano gratuito da SerpAPI (250).
    - cron: '0 11 1,15 * *'
  workflow_dispatch:  # permite rodar manualmente pelo GitHub

jobs:
  scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install requests python-dotenv

      - name: Coletar, salvar e calcular custos
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPAPI_KEY_2: ${{ secrets.SERPAPI_KEY_2 }}
        run: |
          python scraper_pf.py
          python salvar_supabase.py
          python calcular_custos_pratos.py

      - name: Notificar sucesso
        if: success()
        run: echo "✅ Índice PF atualizado com sucesso em $(date)"

      - name: Notificar falha
        if: failure()
        run: echo "❌ Falha na atualização do Índice PF em $(date)"
