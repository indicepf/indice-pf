name: Scraper Semanal — Índice PF

on:
  schedule:
    # Toda segunda às 8h (Brasília = 11h UTC) = 4–5 coletas/mês.
    # 115 ingredientes × 5 = ~575 chamadas/mês (4 contas SerpAPI = 1000 grátis/mês).
    # Obs.: o cron do GitHub é "melhor esforço" — costuma atrasar horas em
    # horários cheios; o dia da coleta é o que importa, não a hora exata.
    - cron: '0 11 * * 1'
  workflow_dispatch:  # permite rodar manualmente pelo GitHub
    inputs:
      modo:
        description: 'faltantes = pega só o que não veio nos últimos 6 dias e soma ao último snapshot (barato); completo = raspa os 115'
        type: choice
        default: faltantes   # default seguro: clique acidental não gasta os 115
        options: [faltantes, completo]

# nunca deixa dois runs do scraper rodarem ao mesmo tempo (gasto dobrado + corrida no snapshot)
concurrency:
  group: scraper-indice-pf
  cancel-in-progress: false

jobs:
  scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install requests python-dotenv

      - name: Coletar e salvar (staging — índice só atualiza após aprovação no admin)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPAPI_KEY_2: ${{ secrets.SERPAPI_KEY_2 }}
          SERPAPI_KEY_3: ${{ secrets.SERPAPI_KEY_3 }}
          SERPAPI_KEY_4: ${{ secrets.SERPAPI_KEY_4 }}
          # modo 'completo' (cron ou dispatch default) = full run dos 115.
          # modo 'faltantes' (dispatch) = skip de 6 dias liga + merge no último snapshot,
          #   raspando só os que não vieram (manuais/não-encontrados).
          FORCE_RESCRAPE: ${{ (github.event_name == 'schedule' || github.event.inputs.modo == 'completo') && '1' || '' }}
          SCRAPE_MERGE:   ${{ github.event.inputs.modo == 'faltantes' && '1' || '' }}
        run: |
          echo "Modo: ${{ github.event.inputs.modo || 'completo (agendado)' }} | FORCE_RESCRAPE='${FORCE_RESCRAPE}' SCRAPE_MERGE='${SCRAPE_MERGE}'"
          python pipeline/scraper_pf.py
          python pipeline/salvar_supabase.py
          # AUDITORIA ANTES DE INTEGRAR: calcular_custos_pratos NÃO roda mais aqui.
          # A coleta fica em precos/resultados_brutos, fora do índice, até o admin
          # revisar (Admin → Dados: variações fortes/entradas) e aprovar em
          # Admin → Coleta ("Aprovar coleta e integrar ao índice").

      - name: Notificar sucesso
        if: success()
        run: echo "📋 Coleta em staging — revisar e aprovar em /admin (aba Coleta) para entrar no índice"

      - name: Notificar falha
        if: failure()
        run: echo "❌ Falha na atualização do Índice PF em $(date)"
