name: Scraper Semanal — Índice PF

on:
  schedule:
    # Toda quarta-feira às 8h (horário de Brasília = 11h UTC)
    - cron: '0 11 * * 3'
  workflow_dispatch:  # permite rodar manualmente pelo GitHub

jobs:
  scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install supabase python-dotenv requests beautifulsoup4

      - name: Executar scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          python scraper_pf.py
          python salvar_supabase.py

      - name: Limpar snapshot simulado mais antigo
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python limpar_simulados.py

      - name: Notificar sucesso
        if: success()
        run: echo "✅ Índice PF atualizado com sucesso em $(date)"

      - name: Notificar falha
        if: failure()
        run: echo "❌ Falha na atualização do Índice PF em $(date)"
